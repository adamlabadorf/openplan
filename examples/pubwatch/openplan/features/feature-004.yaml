acceptance_criteria:
- Given a researcher has configured email preferences with a valid email address and
  subscription, when the scheduler runs at the designated time, then an email digest
  is automatically generated and sent to the researcher's configured email address
- Given a researcher wants to disable email automation for their profile, when they
  run the pubwatch email disable command with their profile identifier, then the automated
  email sending is stopped for that specific profile and no further emails are sent
  to that researcher
- Given an email fails to send due to a temporary network error, when the system retries
  the send operation, then it logs the specific error message to the system logs and
  attempts to resend the email within 24 hours
- Given a researcher has multiple profiles with different email preferences, when
  the scheduler runs, then separate email digests are generated and sent for each
  profile according to their individual subscription settings
- Given an email fails to send due to a permanent error such as invalid email address,
  when the system retries the send operation, then it logs the permanent failure error
  and stops attempting to send further emails to that address
complexity: high
dependencies:
- feature-003
description: A feature to automatically schedule and send weekly email digests without
  manual intervention
id: feature-004
spec_ready: true
title: Weekly Email Automation
