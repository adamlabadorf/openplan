acceptance_criteria:
  - Given a researcher wants to customize email content, when they run pubwatch template
    edit, then they can modify the email template with placeholders for paper data
  - Given an email template has been edited, when the system generates a digest, then
    the custom template is applied to the paper data
  - Given a researcher wants to revert to a default template, when they run pubwatch
    template reset, then the default template is restored for that profile
complexity: medium
dependencies:
  - feature-003
description: A feature to configure and customize email templates for different types
  of paper digests
id: feature-005
spec_ready: false
title: Email Template Management
